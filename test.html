<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FSDM Test</title>
</head>
<body>

  <h1>FSDM Resources — Test</h1>
  <p id="status">Chargement...</p>
  <ul id="list"></ul>

  <script>
    const SHEET_ID = "1wL30Zd5g247nhLxZ8cWsOVr4wXlLbE5qCrqIbX8Ov2Y";
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    fetch(URL)
      .then(res => res.text())
      .then(text => {
        // Google wraps the response, we clean it
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows;

        document.getElementById("status").textContent = rows.length + " fichiers trouvés :";

        const list = document.getElementById("list");

        rows.forEach(row => {
          const cols = row.c;
          const department = cols[0]?.v || "";
          const filiere    = cols[1]?.v || "";
          const semester   = cols[2]?.v || "";
          const module     = cols[3]?.v || "";
          const professor  = cols[4]?.v || "";
          const type       = cols[5]?.v || "";
          const title      = cols[6]?.v || "";
          const driveId    = cols[7]?.v || "";

          const link = `https://drive.google.com/file/d/${driveId}/preview`;

          const li = document.createElement("li");
          li.innerHTML = `
            <a href="${link}" target="_blank">
              [${semester}] ${filiere} — ${module} — ${type} — ${title} (${professor})
            </a>
          `;
          list.appendChild(li);
        });
      })
      .catch(err => {
        document.getElementById("status").textContent = "Erreur : " + err.message;
      });
  </script>

</body>
</html>
